name: Frontend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # NEXT_PUBLIC_API_BASE is required at build time for static analysis;
        # production deploys override it via the runtime environment.
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:5132
        run: npm run build

      # Tests will be added in Phase 8 (Playwright). Once added, uncomment:
      # - name: Test
      #   run: npm test
